# =============================================================================
# rumble-py — example configuration
# =============================================================================
#
# Copy this file to `config.yaml` and edit to taste. `config.yaml` is in
# .gitignore and will not be committed.
#
# DTMF command model
# ------------------
# The original C# tool used a CSV that mapped a DTMF "server number" plus a
# "channel number" to a server+channel pair. rumble-py keeps that mental model
# but stores it in YAML so it's easier to read and comment.
#
# Example: if the operator keys `*12#` on the radio, that could be parsed as
# server=1, channel=2 and look up `servers[1]` then `channel_map[1][2]`.
# The exact DTMF grammar is defined in code; this file just provides the data.
# =============================================================================


# ---------------------------------------------------------------------------
# Operator identity
# ---------------------------------------------------------------------------
# Your amateur radio callsign. Used in voice-ID announcements and as the
# default Mumble username if a server entry doesn't override it.
callsign: "AE9S"


# ---------------------------------------------------------------------------
# Mumble servers
# ---------------------------------------------------------------------------
# A list of every Mumble server this radio is allowed to connect to.
# Each entry needs:
#   name          — short human-readable label (logged, spoken via TTS)
#   host          — DNS name or IP
#   port          — usually 64738
#   username      — what we'll appear as in Mumble (defaults to `callsign`)
#   password      — optional; omit or leave blank for open servers
#   channel_path  — channel to join after connect, as a slash-separated path
#                   from the root, e.g. "Root/Repeaters/W9XYZ".
servers:
  - name: "local-dev"
    host: "127.0.0.1"
    port: 64738
    username: "AE9S"
    # password: ""
    channel_path: "Root"

  - name: "example-repeater-net"
    host: "mumble.example.org"
    port: 64738
    username: "AE9S"
    channel_path: "Root/Repeaters/Midwest"


# ---------------------------------------------------------------------------
# DTMF channel map
# ---------------------------------------------------------------------------
# Maps "server number + channel number" pairs (as keyed on the radio) to an
# entry in the `servers:` list above (by `name`) and, optionally, an override
# of which channel to join.
#
# The outer key is the server number (DTMF digit), the inner key is the
# channel number (DTMF digit). Each leaf points to:
#   server        — name of an entry from `servers:` above
#   channel_path  — optional override of that server's default channel_path
channel_map:
  1:
    1:
      server: "local-dev"
      channel_path: "Root"
    2:
      server: "local-dev"
      channel_path: "Root/Lobby"
  2:
    1:
      server: "example-repeater-net"
      channel_path: "Root/Repeaters/Midwest"
    2:
      server: "example-repeater-net"
      channel_path: "Root/Repeaters/Mountain"


# ---------------------------------------------------------------------------
# Audio devices
# ---------------------------------------------------------------------------
# Names as reported by `python -m sounddevice`. Use "default" to let the OS
# pick. On Linux these are usually ALSA device names; on Windows they're
# WASAPI/MME device names.
audio:
  input_device: "default"     # radio receiver audio coming IN to the computer
  output_device: "default"    # audio going OUT to the radio's mic / line-in


# ---------------------------------------------------------------------------
# Station ID (CW or voice WAV played periodically over the air)
# ---------------------------------------------------------------------------
# Per FCC §97.119, you must ID at least every 10 minutes when transmitting.
# `wav_path` is the file played; `interval_seconds` is how often.
ident:
  wav_path: "./ident.wav"
  interval_seconds: 540        # 9 minutes — safely under the 10-minute rule


# ---------------------------------------------------------------------------
# Local web UI
# ---------------------------------------------------------------------------
# FastAPI/uvicorn binding. Keep this on 127.0.0.1 unless you really want it
# exposed to the network.
web:
  bind_address: "127.0.0.1"
  port: 8080
